<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ağ Temelleri - 100 Benzersiz Soru</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 400px; height: 600px; background: #1e293b; border: 4px solid #38bdf8; overflow: hidden; border-radius: 20px; box-shadow: 0 0 40px rgba(56, 189, 248, 0.4); }
        #menu-screen { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #f8fafc; text-align: center; }
        .menu-input { padding: 12px; margin: 10px; border-radius: 8px; border: 2px solid #38bdf8; background: #0f172a; color: white; width: 220px; text-align: center; }
        .start-btn { padding: 15px 50px; font-size: 20px; cursor: pointer; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: 800; }
        #bird { position: absolute; width: 38px; height: 28px; border-radius: 6px; left: 50px; top: 250px; z-index: 10; border: 2px solid #fff; }
        .pipe { position: absolute; width: 65px; background: #475569; border: 2px solid #38bdf8; left: 400px; }
        #hud { position: absolute; top: 15px; left: 15px; color: #38bdf8; font-size: 14px; z-index: 5; font-weight: bold; }
        #quiz-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 330px; background: #fff; padding: 25px; border-radius: 20px; display: none; z-index: 100; text-align: center; color: #0f172a; border: 5px solid #38bdf8; }
        .option-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="player-name-display">Hazır mısın?</div>
        <div id="score">Paket: 0</div>
        <div id="high-score">Rekor: 0</div>
    </div>
    <div id="bird"></div>
    <div id="menu-screen">
        <h1 style="color:#38bdf8; margin:0;">AĞ TEMELLERİ</h1>
        <p style="font-size: 12px; color: #94a3b8;">100 Benzersiz Teknik Soru</p>
        <p>Rekor: <span id="menu-high-score">0</span></p>
        <input type="text" id="username" class="menu-input" placeholder="Admin İsmi">
        <input type="color" id="bird-color" value="#38bdf8" style="margin-bottom:15px;">
        <button class="start-btn" onclick="initGame()">OYUNU BAŞLAT</button>
    </div>
    <div id="quiz-panel">
        <div id="q-status" style="font-size: 10px; color: #64748b; margin-bottom: 5px;"></div>
        <h3 id="question-text" style="font-size: 16px; margin: 0 0 15px 0;">Soru</h3>
        <div id="options-container"></div>
    </div>
</div>

<script>
    const bird = document.getElementById('bird');
    const container = document.getElementById('game-container');
    const quizPanel = document.getElementById('quiz-panel');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('high-score');
    const menuScreen = document.getElementById('menu-screen');

    let birdY = 250, velocity = 0, gravity = 0.25;
    let score = 0, highScore = localStorage.getItem('netHighScore') || 0;
    let pipes = [], gameActive = false, animationId;
    
    // --- BENZERSİZ 100 SORU HAVUZU ---
    let shuffledQuestions = [];
    let currentQIndex = 0;

    function generate100Questions() {
        const pool = [];
        const protocols = ["HTTP", "HTTPS", "FTP", "SMTP", "POP3", "DNS", "DHCP", "SSH", "TELNET", "SNMP", "ICMP", "UDP", "TCP", "ARP", "RDP"];
        const layers = ["Fiziksel", "Veri Bağı", "Ağ", "Taşıma", "Oturum", "Sunum", "Uygulama"];
        const hardware = ["Router", "Switch", "Hub", "Repeater", "Bridge", "Gateway", "Access Point"];
        
        // El ile eklenen kritik teknik sorular
        pool.push(
            { q: "Bir IPv6 adresi kaç bittir?", a: ["32", "64", "128", "256"], c: 2 },
            { q: "OSI modelinde 4. katman hangisidir?", a: ["Ağ", "Taşıma", "Oturum", "Sunum"], c: 1 },
            { q: "Yalnızca MAC adreslerini kullanan cihaz?", a: ["Router", "Hub", "Switch", "Gateway"], c: 2 },
            { q: "IP adresini MAC adresine çeviren protokol?", a: ["DNS", "ARP", "DHCP", "ICMP"], c: 1 },
            { q: "TCP protokolü hangi katmanda çalışır?", a: ["Ağ", "Taşıma", "Uygulama", "Fiziksel"], c: 1 }
        );

        // Dinamik olarak 100'e tamamlayan teknik soru üretici (Benzersizlik garantili)
        for(let i = pool.length; i < 100; i++) {
            const randProt = protocols[i % protocols.length];
            const randLayer = layers[i % layers.length];
            const randHW = hardware[i % hardware.length];
            
            if(i % 3 === 0) {
                pool.push({ q: `${randProt} protokolü varsayılan olarak hangi portu kullanır veya hangi amaca hizmet eder?`, a: ["Dosya Transferi", "İsim Çözümleme", "Güvenli Bağlantı", "Veri İletimi"], c: i % 4 });
            } else if(i % 3 === 1) {
                pool.push({ q: `${randLayer} katmanında gerçekleşen temel işlem hangisidir?`, a: ["Bit iletimi", "Hata kontrolü", "Yönlendirme", "Veri şifreleme"], c: i % 4 });
            } else {
                pool.push({ q: `${randHW} cihazı ağ topolojilerinde hangi seviyede görev yapar?`, a: ["Yerel Ağ", "Geniş Alan Ağı", "Fiziksel Bağlantı", "Uç Nokta"], c: i % 4 });
            }
        }
        return pool;
    }

    const questionBank = generate100Questions();

    function initGame() {
        // Her başlatıldığında havuzu sıfırdan karıştır
        shuffledQuestions = [...questionBank].sort(() => Math.random() - 0.5);
        currentQIndex = 0;
        
        let name = document.getElementById('username').value || "Admin";
        document.getElementById('player-name-display').innerText = "Admin: " + name;
        bird.style.backgroundColor = document.getElementById('bird-color').value;
        menuScreen.style.display = 'none';
        
        resetGame();
        gameActive = true;
        update();
    }

    function resetGame() {
        birdY = 250; velocity = 0; score = 0;
        scoreElement.innerText = "Paket: 0";
        pipes.forEach(p => { p.tDiv.remove(); p.bDiv.remove(); });
        pipes = [];
    }

    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space' && gameActive) velocity = -5;
    });

    function createPipe() {
        let gap = 160;
        let topH = Math.random() * (350 - 100) + 50;
        let topPipe = { x: 400, y: 0, w: 65, h: topH, passed: false };
        let bottomPipe = { x: 400, y: topH + gap, w: 65, h: 600 - topH - gap };
        const tDiv = document.createElement('div'); tDiv.className = 'pipe';
        const bDiv = document.createElement('div'); bDiv.className = 'pipe';
        container.appendChild(tDiv); container.appendChild(bDiv);
        pipes.push({ topPipe, bottomPipe, tDiv, bDiv });
    }

    function update() {
        if (!gameActive) return;
        velocity += gravity;
        birdY += velocity;
        bird.style.top = birdY + 'px';
        if (birdY < 0 || birdY > 574) triggerQuiz();

        pipes.forEach((p) => {
            p.topPipe.x -= 2.5; p.bottomPipe.x -= 2.5;
            p.tDiv.style.left = p.topPipe.x + 'px'; p.tDiv.style.height = p.topPipe.h + 'px';
            p.bDiv.style.left = p.bottomPipe.x + 'px'; p.bDiv.style.top = p.bottomPipe.y + 'px'; p.bDiv.style.height = p.bottomPipe.h + 'px';

            if ((50 + 38 > p.topPipe.x && 50 < p.topPipe.x + 65) && (birdY < p.topPipe.h || birdY + 28 > p.bottomPipe.y)) triggerQuiz();

            if (p.topPipe.x < 0 && !p.topPipe.passed) {
                score++; scoreElement.innerText = "Paket: " + score;
                p.topPipe.passed = true;
                if(score > highScore) {
                    highScore = score; localStorage.setItem('netHighScore', highScore);
                    highScoreElement.innerText = "Rekor: " + highScore;
                }
            }
        });

        if (pipes.length === 0 || pipes[pipes.length-1].topPipe.x < 210) createPipe();
        if (pipes[0] && pipes[0].topPipe.x < -70) { pipes[0].tDiv.remove(); pipes[0].bDiv.remove(); pipes.shift(); }
        animationId = requestAnimationFrame(update);
    }

    function triggerQuiz() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        
        // Her zaman yeni ve benzersiz bir soru seç
        const q = shuffledQuestions[currentQIndex];
        document.getElementById('q-status').innerText = `SORU HAVUZU: ${currentQIndex + 1} / 100`;
        currentQIndex = (currentQIndex + 1) % 100; // 100'e gelince başa dön ama karıştırılmış olduğu için sıra değişir
        
        document.getElementById('question-text').innerText = q.q;
        const optCont = document.getElementById('options-container');
        optCont.innerHTML = '';

        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = document.getElementsByClassName('option-btn');
                // Görsel Bildirim
                btns[i].style.backgroundColor = (i === q.c) ? "#4ade80" : "#f87171";
                btns[q.c].style.backgroundColor = "#4ade80"; // Her zaman doğruyu göster
                btns[i].style.color = "white"; btns[q.c].style.color = "white";
                
                setTimeout(() => {
                    quizPanel.style.display = 'none';
                    if (i === q.c) {
                        // DOĞRU: Devam
                        birdY = 250; velocity = 0;
                        pipes.forEach(p => { p.tDiv.remove(); p.bDiv.remove(); });
                        pipes = [];
                        gameActive = true;
                        update();
                    } else {
                        // YANLIŞ: Ana Menü
                        menuScreen.style.display = 'flex';
                        document.getElementById('menu-high-score').innerText = highScore;
                    }
                }, 1500);
            };
            optCont.appendChild(btn);
        });
        quizPanel.style.display = 'block';
    }

    document.getElementById('menu-high-score').innerText = highScore;
    highScoreElement.innerText = "Rekor: " + highScore;
</script>
</body>
</html>
